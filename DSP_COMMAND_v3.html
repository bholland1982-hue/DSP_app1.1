<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>DSP COMMAND v3</title><style>
:root{--green:#137631;--dark:#174628;--cream:#f7f4ec;--gold:#b59a5b;--ink:#20241f;--muted:#687466;--line:#ddd6c8;--danger:#9b2d24}*{box-sizing:border-box}body{margin:0;font-family:Arial,Helvetica,sans-serif;background:var(--cream);color:var(--ink);display:flex;min-height:100vh}.sidebar{width:310px;background:linear-gradient(180deg,var(--dark),#0e321c);color:#fff;position:fixed;inset:0 auto 0 0;padding:18px;overflow:auto}.brand{display:flex;gap:12px;align-items:center;padding-bottom:16px;margin-bottom:12px;border-bottom:1px solid rgba(255,255,255,.22)}.brand img{width:88px;background:#fff;border-radius:14px;padding:7px}.brand h1{font-size:22px;margin:0}.brand p{font-size:12px;margin:4px 0 0;color:#dce9dc}.nav{display:block;width:100%;text-align:left;background:transparent;border:0;color:#fff;border-radius:10px;padding:10px 12px;margin:3px 0;cursor:pointer;font-weight:700}.nav:hover,.nav.active{background:rgba(255,255,255,.15)}.wide{width:100%;margin-top:10px}.ghost{background:transparent!important;border:1px solid rgba(255,255,255,.45)!important}.import{display:block;text-align:center;border-radius:9px;padding:10px 14px;font-weight:700;cursor:pointer}.import input{display:none}main{margin-left:310px;width:calc(100% - 310px)}.topbar{position:sticky;top:0;background:#fff;border-bottom:1px solid var(--line);padding:14px 22px;z-index:2;display:flex;justify-content:space-between;gap:16px;align-items:center}.topbar span{margin-left:18px;color:var(--muted);font-size:14px}#content{padding:24px}h2{margin:0 0 14px;color:var(--dark);font-size:30px}.sub{color:var(--muted);margin-top:-6px}.grid{display:grid;grid-template-columns:repeat(4,minmax(170px,1fr));gap:14px;margin:16px 0}.grid2{display:grid;grid-template-columns:repeat(2,minmax(260px,1fr));gap:16px}.card,.panel{background:#fff;border:1px solid var(--line);border-radius:16px;padding:18px;box-shadow:0 8px 22px rgba(31,40,31,.06)}.card label{font-size:13px;color:var(--muted);display:block}.big{font-size:28px;font-weight:900;color:var(--dark);margin-top:8px}.toolbar{display:flex;flex-wrap:wrap;gap:8px;margin:14px 0}.toolbar input,.toolbar select,input,select,textarea{border:1px solid var(--line);border-radius:10px;padding:10px;background:#fffdf8}.toolbar .grow{flex:1;min-width:240px}button,.btn{background:var(--dark);color:white;border:0;border-radius:9px;padding:10px 14px;font-weight:800;cursor:pointer}.btn2{background:var(--gold)}.danger{background:var(--danger)}table{width:100%;border-collapse:collapse;background:#fff;border-radius:16px;overflow:hidden;box-shadow:0 8px 22px rgba(31,40,31,.06)}th,td{border-bottom:1px solid var(--line);padding:10px;text-align:left;vertical-align:top;font-size:14px}th{background:#e9e1d2;color:var(--dark);font-size:12px;text-transform:uppercase;letter-spacing:.03em}td input,td select,td textarea{width:100%;min-width:90px;padding:8px}td textarea{min-height:40px}.right{text-align:right}.muted{color:var(--muted)}.pill{display:inline-block;border-radius:100px;background:#eef5ee;color:var(--dark);padding:4px 9px;font-weight:800;font-size:12px}.tabs{display:flex;gap:8px;flex-wrap:wrap;margin:12px 0}.tab{background:#fff;color:var(--dark);border:1px solid var(--line)}.tab.active{background:var(--dark);color:#fff}.logoLarge{max-width:520px;width:100%;background:#fff;border-radius:18px;padding:14px;border:1px solid var(--line)}.notice{background:#fff8e7;border:1px solid #ead6a5;border-radius:12px;padding:12px;margin:12px 0}.aiBox{width:100%;min-height:120px}.answer{white-space:pre-wrap;line-height:1.55}.footerSpace{height:40px}@media(max-width:1000px){body{display:block}.sidebar{position:relative;width:100%;height:auto}main{margin:0;width:100%}.grid,.grid2{grid-template-columns:1fr}.topbar{display:block}.topbar span{display:block;margin:5px 0}table{display:block;overflow-x:auto}.brand img{width:70px}}
</style></head>

<script>

const schema={
 dashboard:{label:'Dashboard'},
 leads:{label:'Leads',cols:[['date','Date','date'],['client','Client','text'],['weddingDate','Wedding Date','date'],['venue','Venue','text'],['source','Lead Source','text'],['venueContact','Venue Salesperson','text'],['salesperson','DSP Salesperson','selectSales'],['status','Status','select:New Lead|Appointment Scheduled|Estimate Sent|Booked|Lost'],['estimate','Estimate $','money'],['contract','Contract $','money'],['commission','Commission %','number'],['notes','Notes','textarea']]},

const defaults={leads:[{date:'2026-05-30',client:'Sample Wedding',weddingDate:'2026-09-12',venue:'Sample Catering Hall',source:'Venue Referral',venueContact:'Venue Sales Rep',salesperson:'Brian',status:'Estimate Sent',estimate:15000,contract:0,commission:10,notes:'Replace with real lead.'}],appointments:[],schedule:[],venues:[],financials:[{month:'2026-05',revenue:425000,flowerCost:82000,fieldLabor:60000,officePayroll:55000,commissions:18000,overhead:47500,misc:7000,notes:'Sample month.'}],overhead:[],labor:[],worksheets:[]};
let db=JSON.parse(localStorage.getItem('dspCommandDB')||'null')||structuredClone(defaults);
function save(){localStorage.setItem('dspCommandDB',JSON.stringify(db)); document.getElementById('savedState').textContent='Saved '+new Date().toLocaleTimeString();}
function money(n){return (+n||0).toLocaleString('en-US',{style:'currency',currency:'USD',maximumFractionDigits:0})}function pct(n){return isFinite(n)?(n*100).toFixed(1)+'%':'-'}
function sum(arr,k){return arr.reduce((a,r)=>a+(+r[k]||0),0)}
function nav(){let n=document.getElementById('nav'); n.innerHTML=''; Object.entries(schema).forEach(([id,s],i)=>{let b=document.createElement('button');b.className='nav'+(i==0?' active':'');b.textContent=s.label;b.onclick=()=>render(id);n.appendChild(b);});}
function setActive(id){document.querySelectorAll('.nav').forEach(b=>b.classList.toggle('active',b.textContent===schema[id].label));}
function input(type,val,row,key){let html=''; if(type==='selectSales') html=sel(COMPANY.sales,val); else if(type==='selectLoc') html=sel(COMPANY.locations,val); else if(type.startsWith('select:')) html=sel(type.slice(7).split('|'),val); else if(type==='textarea') html=`<textarea data-k="${key}">${val||''}</textarea>`; else html=`<input type="${type==='money'?'number':type}" data-k="${key}" value="${val??''}">`; return html;}
function sel(opts,val){return `<select><option></option>${opts.map(o=>`<option ${o==val?'selected':''}>${o}</option>`).join('')}</select>`}
function table(id){let s=schema[id], rows=db[id]||[];return `<div class="toolbar"><button onclick="add('${id}')">Add ${s.label.slice(0,-1)||'Row'}</button><button class="btn2" onclick="exportCSV('${id}')">Export CSV</button><input class="grow" placeholder="Search ${s.label}" oninput="filterTable(this.value)"></div><table id="tbl"><thead><tr>${s.cols.map(c=>`<th>${c[1]}</th>`).join('')}<th>Actions</th></tr></thead><tbody>${rows.map((r,i)=>`<tr data-i="${i}">${s.cols.map(c=>`<td>${input(c[2],r[c[0]],r,c[0])}</td>`).join('')}<td><button class="danger" onclick="del('${id}',${i})">Delete</button></td></tr>`).join('')}</tbody></table>`}
function wireTable(id){document.querySelectorAll('#tbl tbody tr').forEach(tr=>tr.querySelectorAll('input,select,textarea').forEach((el,ci)=>{el.oninput=()=>{let key=schema[id].cols[ci][0]; db[id][tr.dataset.i][key]=el.value; save();}}));}
function add(id){let r={}; schema[id].cols.forEach(c=>r[c[0]]=''); db[id].push(r); save(); render(id)}function del(id,i){if(confirm('Delete this row?')){db[id].splice(i,1);save();render(id)}}

function production(){let rows=db.worksheets||[];return `<h2>Production Worksheets</h2><p class="sub">Flower worksheets, equipment worksheets, and personal flowers by event.</p><div class="toolbar"><button onclick="addWorksheet()">Add Worksheet</button><button class="btn2" onclick="exportCSV('worksheets')">Export CSV</button></div><table id="ws"><thead><tr><th>Event</th><th>Date</th><th>Designer</th><th>Flower Worksheet</th><th>Equipment Worksheet</th><th>Personal Flowers</th><th>Status</th><th>Actions</th></tr></thead><tbody>${rows.map((r,i)=>`<tr><td><input value="${r.event||''}" data-k="event"></td><td><input type="date" value="${r.date||''}" data-k="date"></td><td><input value="${r.designer||''}" data-k="designer"></td><td><textarea data-k="flowers" placeholder="Ceremony, cocktail hour, reception, specialty pieces">${r.flowers||''}</textarea></td><td><textarea data-k="equipment" placeholder="Chuppah, arches, vases, candles, props, furniture">${r.equipment||''}</textarea></td><td><textarea data-k="personal" placeholder="Bouquets, boutonnieres, corsages, family flowers">${r.personal||''}</textarea></td><td>${sel(['Not Started','In Production','Complete','Loaded','Delivered'],r.status)}</td><td><button class="danger" onclick="delWorksheet(${i})">Delete</button></td></tr>`).join('')}</tbody></table>`}
function wireWorksheets(){document.querySelectorAll('#ws tbody tr').forEach((tr,i)=>tr.querySelectorAll('input,textarea,select').forEach(el=>{el.oninput=()=>{db.worksheets[i][el.dataset.k||'status']=el.value;save();}}))}
function addWorksheet(){db.worksheets.push({event:'',date:'',designer:'',flowers:'',equipment:'',personal:'',status:'Not Started'});save();render('production')}function delWorksheet(i){if(confirm('Delete worksheet?')){db.worksheets.splice(i,1);save();render('production')}}
function sales(){let people=COMPANY.sales.map(p=>{let l=db.leads.filter(x=>x.salesperson===p), booked=l.filter(x=>x.status==='Booked');return `<div class="card"><label>${p}</label><div class="big">${money(sum(l,'contract'))}</div><p>${l.length} leads | ${booked.length} bookings | ${pct(booked.length/l.length)} close</p></div>`}).join('');return `<h2>Sales Team</h2><div class="grid">${people}</div><div class="panel"><h3>Active Salespeople</h3><p class="pill">Brian</p> <p class="pill">Bobby</p> <p class="pill">Steven</p> <p class="pill">John</p> <p class="pill">Maddy</p></div>`}
function reports(){return `<h2>Reports</h2><div class="grid2"><div class="panel"><h3>Financial Summary</h3><p>Revenue: <b>${money(sum(db.financials,'revenue'))}</b></p><p>Flower Cost: <b>${money(sum(db.financials,'flowerCost'))}</b></p><p>Labor: <b>${money(sum(db.financials,'fieldLabor')+sum(db.financials,'officePayroll'))}</b></p><p>Overhead: <b>${money(sum(db.financials,'overhead')+sum(db.overhead,'amount'))}</b></p></div><div class="panel"><h3>Pipeline Summary</h3><p>Total Leads: <b>${db.leads.length}</b></p><p>Booked: <b>${db.leads.filter(x=>x.status==='Booked').length}</b></p><p>Estimated Pipeline: <b>${money(sum(db.leads,'estimate'))}</b></p><p>Booked Contracts: <b>${money(sum(db.leads,'contract'))}</b></p></div></div>`}
function ai(){return `<h2>AI Insights</h2><p class="sub">Built-in local analysis. Export your backup and upload it to ChatGPT for deeper review.</p><textarea id="q" class="aiBox" placeholder="Ask: Which salesperson has highest close rate? Why was profit down? Show venue performance."></textarea><div class="toolbar"><button onclick="askAI()">Run Insight</button></div><div class="panel answer" id="ans">Ready.</div>`}
function askAI(){let q=document.getElementById('q').value.toLowerCase();let ans=''; if(q.includes('sales')) ans=COMPANY.sales.map(p=>{let l=db.leads.filter(x=>x.salesperson===p), b=l.filter(x=>x.status==='Booked');return `${p}: ${l.length} leads, ${b.length} bookings, ${pct(b.length/l.length)} close, ${money(sum(l,'contract'))} booked.`}).join('\n'); else if(q.includes('venue')){let m={};db.leads.forEach(l=>{m[l.venue]=m[l.venue]||{leads:0,booked:0,rev:0};m[l.venue].leads++;if(l.status==='Booked')m[l.venue].booked++;m[l.venue].rev+=+l.contract||0});ans=Object.entries(m).map(([v,x])=>`${v||'Unknown'}: ${x.leads} leads, ${x.booked} booked, ${money(x.rev)} booked.`).join('\n')} else if(q.includes('profit')||q.includes('financial')) ans=document.querySelector('#content')&&`Revenue ${money(sum(db.financials,'revenue'))}\nFlower ${money(sum(db.financials,'flowerCost'))}\nLabor ${money(sum(db.financials,'fieldLabor')+sum(db.financials,'officePayroll'))}\nOverhead ${money(sum(db.financials,'overhead')+sum(db.overhead,'amount'))}\nReview high labor %, flower %, and overhead % on the dashboard.`; else ans='Try asking about sales, venues, profit, financials, leads, or close rate.'; document.getElementById('ans').textContent=ans;}

function render(id){setActive(id);let c=document.getElementById('content'); if(id==='dashboard') c.innerHTML=dashboard(); else if(id==='production') {c.innerHTML=production();wireWorksheets()} else if(id==='sales') c.innerHTML=sales(); else if(id==='reports') c.innerHTML=reports(); else if(id==='ai') c.innerHTML=ai(); else if(id==='company') c.innerHTML=company(); else {c.innerHTML=`<h2>${schema[id].label}</h2>${table(id)}`; wireTable(id);} }
function exportCSV(id){let rows=db[id]||[]; if(id==='worksheets') rows=db.worksheets; if(!rows.length)return alert('No rows to export.'); let keys=Object.keys(rows[0]); let csv=[keys.join(',')].concat(rows.map(r=>keys.map(k=>'"'+String(r[k]??'').replaceAll('"','""')+'"').join(','))).join('\n'); let a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));a.download=`dsp_${id}.csv`;a.click();}
document.getElementById('saveAll').onclick=save;document.getElementById('exportAll').onclick=()=>{let a=document.createElement('a');a.href=URL.createObjectURL(new Blob([JSON.stringify(db,null,2)],{type:'application/json'}));a.download='DSP_COMMAND_backup.json';a.click()};document.getElementById('importFile').onchange=e=>{let f=e.target.files[0]; if(!f)return; let r=new FileReader();r.onload=()=>{db=JSON.parse(r.result);save();render('dashboard')};r.readAsText(f)};
